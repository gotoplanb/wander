schema_version = 1
id = "mergesort"
title = "Merge sort"
difficulty = "medium"
categories = ["sort"]
signature = "pub fn mergesort(xs: Vec<i32>) -> Vec<i32>"
prompt = """
Sort `xs` in ascending order using the merge sort algorithm and return the
sorted vector.

SIGNATURE (must match exactly):
    pub fn mergesort(xs: Vec<i32>) -> Vec<i32>

BEHAVIOR
- Take ownership of `xs`, sort it, return it.
- The algorithm must be merge sort: recursively divide the input into two
  halves, sort each half, and merge the sorted halves back together.
  Calling the standard library's `sort` or `sort_unstable` is not the
  implementation we're testing.
- Merge sort is stable; preserve the relative order of equal elements.
- The sort is ascending. An empty or single-element input is returned
  unchanged.

EXAMPLES
- `mergesort(vec![5, 2, 9, 1, 5, 6])` returns `vec![1, 2, 5, 5, 6, 9]`.
- `mergesort(vec![])` returns `vec![]`.
- `mergesort(vec![-3, -1, -4, -1, -5])` returns `vec![-5, -4, -3, -1, -1]`.
"""
