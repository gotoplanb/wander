<div class="scene">
    <div class="video-region video-empty"></div>
    <div class="text-region">
        <h2 class="error-title">AI call failed</h2>
        <p class="error-meta">
            <code>{{ error_type }}</code> from
            <code>{{ backend_description }}</code>
        </p>
        <pre class="error-message">{{ error_message }}</pre>
        <p class="error-hint">
            Set <code>OLLAMA_HOST</code> and <code>WANDERER_MODEL</code> to point at
            a reachable Ollama server with the recommended model pulled. If the model
            returned unexpected text, the raw response is shown above.
        </p>
        <button class="choice" type="button" onclick="location.reload()">Reload</button>
    </div>
</div>
